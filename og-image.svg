  <!-- Railway deploy pill -->
  <rect x="500" y="460" width="280" height="50" rx="25" fill="none" stroke="#4fc3f7" stroke-width="2"/>
  <text x="640" y="492" font-family="system-ui, -apple-system, sans-serif" font-size="22"
