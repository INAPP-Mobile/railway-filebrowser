    <rect x="-50" y="-10" width="30" height="35" rx="3" fill="#ffffff" opacity="0.9"/>
    <rect x="-44" y="-2" width="18" height="2" rx="1" fill="#4fc3f7" opacity="0.6"/>
    <rect x="-44" y="4" width="18" height="2" rx="1" fill="#4fc3f7" opacity="0.6"/>
    <rect x="-44" y="10" width="12" height="2" rx="1" fill="#4fc3f7" opacity="0.6"/>
    <rect x="-5" y="-10" width="30" height="35" rx="3" fill="#ffffff" opacity="0.9"/>
    <rect x="1" y="-2" width="18" height="2" rx="1" fill="#4fc3f7" opacity="0.6"/>
    <rect x="1" y="4" width="18" height="2" rx="1" fill="#4fc3f7" opacity="0.6"/>
    <rect x="1" y="10" width="12" height="2" rx="1" fill="#4fc3f7" opacity="0.6"/>
    <rect x="40" y="-10" width="30" height="35" rx="3" fill="#ffffff" opacity="0.9"/>
    <rect x="46" y="-2" width="18" height="2" rx="1" fill="#4fc3f7" opacity="0.6"/>
    <rect x="46" y="4" width="18" height="2" rx="1" fill="#4fc3f7" opacity="0.6"/>
    <rect x="46" y="10" width="12" height="2" rx="1" fill="#4fc3f7" opacity="0.6"/>
  </g>
  <!-- Title -->
  <text x="500" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72"
