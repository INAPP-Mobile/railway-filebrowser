<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#29b6f6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="40" fill="url(#bg)"/>
  <!-- Folder icon -->
  <g transform="translate(400,380)">
    <path d="M-140,-60 L-100,-60 L-60,-100 L60,-100 L60,-60 L140,-60 L140,100 L-140,100 Z"
          fill="none" stroke="url(#accent)" stroke-width="8" stroke-linejoin="round"/>
    <path d="M-60,-60 L-60,-100 L60,-100 L60,-60"
          fill="url(#accent)" opacity="0.3" stroke="none"/>
    <!-- File icons inside folder -->
    <rect x="-80" y="-20" width="40" height="50" rx="4" fill="#ffffff" opacity="0.9"/>
    <rect x="-72" y="-8" width="24" height="3" rx="1.5" fill="#4fc3f7" opacity="0.6"/>
    <rect x="-72" y="0" width="24" height="3" rx="1.5" fill="#4fc3f7" opacity="0.6"/>
    <rect x="-72" y="8" width="16" height="3" rx="1.5" fill="#4fc3f7" opacity="0.6"/>
    <rect x="-10" y="-20" width="40" height="50" rx="4" fill="#ffffff" opacity="0.9"/>
    <rect x="-2" y="-8" width="24" height="3" rx="1.5" fill="#4fc3f7" opacity="0.6"/>
    <rect x="-2" y="0" width="24" height="3" rx="1.5" fill="#4fc3f7" opacity="0.6"/>
    <rect x="-2" y="8" width="16" height="3" rx="1.5" fill="#4fc3f7" opacity="0.6"/>
    <rect x="60" y="-20" width="40" height="50" rx="4" fill="#ffffff" opacity="0.9"/>
    <rect x="68" y="-8" width="24" height="3" rx="1.5" fill="#4fc3f7" opacity="0.6"/>
    <rect x="68" y="0" width="24" height="3" rx="1.5" fill="#4fc3f7" opacity="0.6"/>
    <rect x="68" y="8" width="16" height="3" rx="1.5" fill="#4fc3f7" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="400" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="48"
        font-weight="700" fill="#ffffff" text-anchor="middle">File Browser</text>
  <text x="400" y="630" font-family="system-ui, -apple-system, sans-serif" font-size="24"
        fill="#4fc3f7" text-anchor="middle" opacity="0.8">Railway Template</text>
</svg>
